<div class="container">
  <div class="header">
    <div class="text">
      <h2>Conexões</h2>
      <p>Gerencie suas fontes e destinos de dados</p>
    </div>
    <button mat-flat-button color="primary" (click)="openNewConnectionDialog()"><mat-icon>add</mat-icon>Nova Conexão</button>
  </div>

  <table mat-table [dataSource]="connections()" class="mat-elevation-z0">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let c">{{c.name}}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell *matCellDef="let c">{{c.type}}</td>
    </ng-container>

    <ng-container matColumnDef="host">
      <th mat-header-cell *matHeaderCellDef>Host</th>
      <td mat-cell *matCellDef="let c">{{c.host}}:{{c.port}}</td>
    </ng-container>

    <ng-container matColumnDef="database">
      <th mat-header-cell *matHeaderCellDef> Database </th>
      <td mat-cell *matCellDef="let c"> {{c.database}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">
        <span class="status-badge" [ngClass]="c.status === 'online' ? 'online' : 'offline'">
          {{c.status}}
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>


</div>
